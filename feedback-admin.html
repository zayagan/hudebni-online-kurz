<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback Admin</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="feedback-admin.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="preview-left">
        <a class="btn secondary top-tab" href="index.html">Zpět na web</a>
      </div>
      <div class="preview-center">
        <h1>Feedback Admin</h1>
      </div>
      <div class="topbar-right preview-right"></div>
    </header>

    <main class="theory-page-wrap">
      <article class="block theory-page-card admin-panel-v2">
        <h2>Soukromý přehled připomínek</h2>
        <p class="hint">Přihlaš se admin tokenem. Po přihlášení se používá krátkodobá bezpečná session.</p>

        <section id="adminAuthSection" class="admin-auth-section">
          <form id="adminAuthForm" class="feedback-form" autocomplete="off">
            <label for="adminTokenInput">Admin token</label>
            <input id="adminTokenInput" type="password" placeholder="Zadej admin token" required />
            <div class="feedback-actions">
              <button id="adminLoginBtn" class="btn" type="submit">Přihlásit</button>
            </div>
          </form>
        </section>

        <section id="adminDashboardSection" class="admin-dashboard-section hidden" aria-live="polite">
          <div class="admin-toolbar">
            <div class="admin-toolbar-group">
              <label for="pageFilterSelect">Stránka</label>
              <select id="pageFilterSelect">
                <option value="">Všechny stránky</option>
              </select>
            </div>

            <div class="admin-toolbar-group">
              <label for="sortSelect">Řazení</label>
              <select id="sortSelect">
                <option value="newest">Nejnovější</option>
                <option value="oldest">Nejstarší</option>
              </select>
            </div>

            <div class="admin-toolbar-actions">
              <button id="refreshBtn" class="btn secondary" type="button">Obnovit</button>
              <button id="logoutBtn" class="btn secondary" type="button">Odhlásit</button>
            </div>
          </div>

          <p id="adminSummary" class="hint"></p>
          <p id="adminStatus" class="feedback" role="status"></p>
          <div id="feedbackList" class="admin-feedback-list"></div>

          <div class="admin-pagination">
            <button id="prevPageBtn" class="btn secondary" type="button">Předchozí</button>
            <span id="pageInfo" class="hint">Strana 1 / 1</span>
            <button id="nextPageBtn" class="btn secondary" type="button">Další</button>
          </div>
        </section>
      </article>
    </main>
    <footer class="site-footer">
      <p>
        © 2026 Zayagan. Všechna práva vyhrazena.
        <a href="terms.html">Podmínky použití</a>
      </p>
    </footer>
  </body>
</html>
