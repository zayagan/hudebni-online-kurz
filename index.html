<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elementární Hudební Teorie Interaktivně</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="frontend-preview" data-i18n-title-key="page_title_index">
    <header class="topbar site-header">
      <div class="preview-left site-brand">
        <h1 data-i18n="main_title">Elementární Hudební Teorie Interaktivně</h1>
      </div>
      <div class="topbar-right preview-right">
        <button id="langToggleBtn" class="btn secondary top-tab lang-toggle" type="button">EN</button>
      </div>
    </header>

    <section id="interactiveDemoSection" class="layout-single wheel-section">
      <article class="block wheel-block triad-preview-card">
        <div class="music-wheel-wrap" aria-label="Hlavní kruh hudební teorie">
          <div class="triad-wheel">
            <a class="triad-label triad-link label-top" href="stupnice.html">
              <span class="triad-text" data-i18n="topic_scale">Stupnice</span>
              <span class="triad-icon triad-icon-scales" aria-hidden="true"></span>
            </a>
            <a class="triad-label triad-link label-left" href="intervaly.html">
              <span class="triad-text" data-i18n="topic_intervals">Intervaly</span>
              <span class="triad-icon triad-icon-intervals" aria-hidden="true">C → E</span>
            </a>
            <a class="triad-label triad-link label-right" href="akordy.html">
              <span class="triad-text" data-i18n="topic_chords">Akordy</span>
              <span class="triad-icon triad-icon-chords" aria-hidden="true">C&nbsp;&nbsp;E&nbsp;&nbsp;G</span>
            </a>
          </div>
        </div>
      </article>
    </section>

    <section class="layout-single" id="feedbackSection">
      <article class="block preview-feedback-panel">
        <h2 data-i18n="feedback_title">Zpětná vazba</h2>
        <p class="hint" data-i18n="feedback_hint">Napiš, co bylo nejasné nebo co bys chtěl v kurzu zlepšit.</p>
        <form id="feedbackForm" class="feedback-form">
          <textarea id="feedbackMessage" rows="6" placeholder="Napiš zprávu..." data-i18n-placeholder="feedback_msg_ph" required></textarea>
          <div class="feedback-actions">
            <button id="feedbackSubmitBtn" class="btn" type="submit" data-i18n="feedback_send">Odeslat</button>
          </div>
        </form>
        <p id="feedbackStatus" class="feedback"></p>
      </article>
    </section>

    <footer class="site-footer">
      <p>
        <span data-i18n="footer_rights">© 2026 Zayagan. Všechna práva vyhrazena.</span>
        <a href="terms.html" data-i18n="footer_terms">Podmínky použití</a>
      </p>
    </footer>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
  </body>
</html>
